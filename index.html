<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  text-align: center;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: #22c55e;
  filter: blur(120px);
  opacity: 0.3;
  top: -100px;
  left: -100px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.logo {
  width: 140px;
  height: auto;
  object-fit: contain;
  border-radius: 0;
  box-shadow: none;
  margin-top: 10px;
}

h2 {
  font-weight: 900;
  font-size: 24px;
  margin: 10px 0 5px;
}

p {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 25px;
}

.btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border-radius: 16px;
  margin: 12px 0;
  text-decoration: none;
  font-weight: bold;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);

  transition: 0.25s;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 0 20px rgba(34,197,94,0.4);
}

.btn:active {
  transform: scale(0.96);
}

.btn img {
  width: 48px;
  height: 48px;
  object-fit: cover;
  border-radius: 12px;
}

.btn span {
  flex: 1;
  text-align: right;
}

.warning {
  display: none;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  background: linear-gradient(45deg, #ef4444, #b91c1c);
  font-weight: bold;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <img id="logo" class="logo">
  <h2 id="title"></h2>
  <p id="desc"></p>

  <div id="warning" class="warning">جاري فتح الرابط...</div>

  <div id="links"></div>
</div>

<script>
// كشف TikTok
function isTikTokInApp() {
  const ua = navigator.userAgent.toLowerCase();
  return ua.includes("tiktok") || ua.includes("bytedance") || ua.includes("musical.ly");
}

// فتح الرابط (محاولات متعددة)
function openLink(url) {
  if (isTikTokInApp()) {

    // محاولة 1
    window.location.href = url;

    // محاولة 2
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }, 200);

    // محاولة 3
    setTimeout(() => {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = url;
      document.body.appendChild(iframe);
    }, 400);

  } else {
    window.open(url, '_blank');
  }
}

// تأثير Ripple
document.addEventListener("click", function(e) {
  const btn = e.target.closest(".btn");
  if (!btn) return;

  const circle = document.createElement("span");
  circle.style.position = "absolute";
  circle.style.width = "100px";
  circle.style.height = "100px";
  circle.style.background = "rgba(255,255,255,0.3)";
  circle.style.borderRadius = "50%";
  circle.style.left = (e.offsetX - 50) + "px";
  circle.style.top = (e.offsetY - 50) + "px";
  circle.style.pointerEvents = "none";
  circle.style.transform = "scale(0)";
  circle.style.transition = "0.4s";

  btn.appendChild(circle);

  setTimeout(() => {
    circle.style.transform = "scale(3)";
    circle.style.opacity = "0";
  }, 10);

  setTimeout(() => {
    circle.remove();
  }, 400);
});

// تحميل البيانات
async function load() {
  try {
    const config = await fetch("config.json").then(r => r.json());
    const links = await fetch("links.json").then(r => r.json());

    document.title = config.title;
    document.getElementById("title").innerText = config.title;
    document.getElementById("desc").innerText = config.description;
    document.getElementById("logo").src = config.logo;

    const container = document.getElementById("links");

    links.forEach(link => {
      const btn = document.createElement("div");
      btn.className = "btn";

      btn.innerHTML = `
        <img src="${link.image}" onerror="this.src='images/fallback.png'">
        <span>${link.title}</span>
      `;

      btn.onclick = () => {
        document.getElementById("warning").style.display = "block";
        openLink(link.url);
      };

      container.appendChild(btn);
    });

  } catch (err) {
    document.body.innerHTML = "<h2 style='color:red'>خطأ في تحميل البيانات</h2>";
    console.error(err);
  }
}

load();
</script>

</body>
</html>
